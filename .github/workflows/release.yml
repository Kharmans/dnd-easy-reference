name: Release Creation

on:
  release:
    types: [published]

jobs:
  build:    
    runs-on: ubuntu-latest
    steps:
    # Checkout files from Github
    - name: Checkout files
      uses: actions/checkout@v6.0.2
      with:
        submodules: recursive

    # Substitute the Manifest and Download URLs in the module.json
    - name: Substitute Manifest and Download Links For Versioned Ones
      id: sub_manifest_link_version
      uses: microsoft/variable-substitution@v1
      with:
        files: 'module.json'
      env:
        version: ${{github.event.release.tag_name}}
        manifest: https://github.com/${{github.repository}}/releases/latest/download/module.json
        download: https://github.com/${{github.repository}}/releases/download/${{github.event.release.tag_name}}/dnd-easy-reference.zip
        url: https://github.com/${{github.repository}}
        changelog: https://github.com/${{github.repository}}/releases/tag/${{github.event.release.tag_name}}

    # Create a zip file with all files required by the module to add to the release
    - name: Create archive
      run:  zip dnd-easy-reference.zip module.json -r lang scripts styles templates main.mjs -x "*/.*"

    # Create a release for this specific version
    - name: Update Release with Files
      id: create_version_release
      uses: ncipollo/release-action@v1
      with:
        allowUpdates: true # Set this to false if you want to prevent updating existing releases
        name: ${{ github.event.release.name }} 
        draft: ${{ github.event.release.unpublished }}
        prerelease: ${{ github.event.release.prerelease }}
        token: ${{ secrets.GITHUB_TOKEN }}
        artifacts: './module.json, ./dnd-easy-reference.zip'
        tag: ${{ github.event.release.tag_name }}
        body: ${{ github.event.release.body }}        
        makeLatest: ${{ github.event.release.prerelease && 'false' || 'legacy' }}

    # Publish to foundry
    - name: Publish Module to FoundryVTT Website  
      if: ${{ !github.event.release.prerelease }}
      id: publish-to-foundry-website
      uses: cs96and/FoundryVTT-release-package@v1
      with:
        package-token: ${{ secrets.PACKAGE_TOKEN }}
        manifest-url: https://github.com/${{github.repository}}/releases/download/${{github.event.release.tag_name}}/module.json
        notes-url: https://github.com/${{github.repository}}/releases/tag/${{github.event.release.tag_name}}

    # Read module metadata for later steps
    - name: Read module metadata
      id: module
      run: |
        echo "title=$(jq -r '.title' module.json)" >> $GITHUB_OUTPUT
        echo "compat_min=$(jq -r '.compatibility.minimum' module.json)" >> $GITHUB_OUTPUT
        echo "compat_verified=$(jq -r '.compatibility.verified' module.json)" >> $GITHUB_OUTPUT
        COMPAT_MAX=$(jq -r '.compatibility.maximum // empty' module.json)
        echo "compat_max=$COMPAT_MAX" >> $GITHUB_OUTPUT

    # Post release notification to Discord
    - name: Post to Discord
      env:
        DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        RELEASE_BODY: ${{ github.event.release.body }}
        MODULE_TITLE: ${{ steps.module.outputs.title }}
        VERSION: ${{ github.event.release.tag_name }}
        COMPAT_MIN: ${{ steps.module.outputs.compat_min }}
        COMPAT_MAX: ${{ steps.module.outputs.compat_max }}
        COMPAT_VERIFIED: ${{ steps.module.outputs.compat_verified }}
        RELEASE_PAGE: https://github.com/${{github.repository}}/releases/tag/${{github.event.release.tag_name}}
      run: |
        python3 -c "
        import json, os, sys

        # Read curated release notes from file, fall back to release body
        notes = ''
        if os.path.isfile('release_notes.txt') and os.path.getsize('release_notes.txt') > 0:
            with open('release_notes.txt', 'r', encoding='utf-8') as f:
                notes = f.read().strip()
        if not notes:
            notes = os.environ.get('RELEASE_BODY', 'New release available!')

        # Truncate to 2000 characters
        if len(notes) > 2000:
            notes = notes[:1997] + '...'

        title = os.environ.get('MODULE_TITLE', 'D&D Easy Reference') + ' v' + os.environ.get('VERSION', '')
        compat_min = os.environ.get('COMPAT_MIN', '')
        compat_max = os.environ.get('COMPAT_MAX', '')
        verified = os.environ.get('COMPAT_VERIFIED', '')
        compat_range = 'All' if not compat_min and not compat_max else f'{compat_min}-{compat_max}' if compat_min != compat_max and compat_max else f'{compat_min}+'
        compat_text = f'{compat_range} (Verified {verified})'
        release_page = os.environ.get('RELEASE_PAGE', '')
        foundry_url = os.environ.get('FOUNDRY_URL', 'https://foundryvtt.com/packages/dnd-easy-reference')

        payload = json.dumps({
            # 'content': '<@&1384920094597185556> <@&1447730718464806973>', # Idea for future: server role pings for interested parties
            'embeds': [{
                'title': title,
                'url': release_page,
                'description': notes,
                'fields': [
                    {'name': 'Core Compatibility', 'value': compat_text, 'inline': True},
                    {'name': 'Foundry Package', 'value': f'[Install from Foundry]({foundry_url})', 'inline': True}
                ],
                'color': 16750848
            }]
        })

        print('JSON Payload:')
        print(json.dumps(json.loads(payload), indent=2))

        with open('/tmp/discord_payload.json', 'w') as f:
            f.write(payload)
        "

        curl -sS -H "Content-Type: application/json" \
            -d @/tmp/discord_payload.json \
            $DISCORD_WEBHOOK